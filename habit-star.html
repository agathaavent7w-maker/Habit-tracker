<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Habits">
<meta name="theme-color" content="#E8EBF2">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='115' fill='%23E8EBF2'/%3E%3Ccircle cx='256' cy='256' r='160' fill='none' stroke='%233A8C6A' stroke-width='28'/%3E%3Cpath d='M172 256l60 60 108-120' stroke='%233A8C6A' stroke-width='32' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
<title>Habits Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#E8EBF2;}
:root{
  --bg:#E8EBF2;
  --green:#3A8C6A;--green-light:#E4F2EC;--green-glow:rgba(58,140,106,.28);
  --text1:#1E2433;--text2:#5C6275;--text3:#8C90A0;
  --sh-out:5px 5px 12px #C8CBD6,-5px -5px 12px #FFF;
  --sh-card:6px 6px 16px #C5C9D5,-6px -6px 16px #FFF;
  --sh-in:inset 4px 4px 10px #C5C9D5,inset -4px -4px 10px #FFF;
  --sh-sm:3px 3px 8px #CBCED9,-3px -3px 8px #FFF;
  --r-xl:22px;--r-lg:16px;--r-md:12px;--r-sm:8px;
}
body{font-family:'DM Sans',sans-serif;color:var(--text1);}
#app{max-width:430px;margin:0 auto;height:100vh;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);position:relative;}

/* ① STAR COLOR TIERS */
.star-green{color:#3A8C6A;}   /* 1-3  */
.star-blue{color:#5478C8;}    /* 4-7  */
.star-purple{color:#8B5EC4;}  /* 8-12 */
.star-gold{color:#C9960A;}    /* 13+  */

/* HEADER */
.hdr{padding:20px 24px 12px;display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0;}
.brand-name{font-family:'DM Serif Display',serif;font-size:26px;line-height:1;color:var(--text1);letter-spacing:-.5px;}
.brand-name em{font-style:normal;color:var(--green);}
.brand-sub{font-size:12px;color:var(--text3);margin-top:4px;}
.hdr-right{display:flex;align-items:center;gap:10px;}
.coin-pill{display:flex;align-items:center;gap:8px;background:var(--bg);box-shadow:var(--sh-out);border-radius:40px;padding:9px 16px 9px 10px;cursor:pointer;border:none;font-family:inherit;}
.coin-orb{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#50B888,#2A7050);display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;box-shadow:1px 2px 6px var(--green-glow);}
.coin-val{font-size:16px;font-weight:600;color:var(--text1);}
.io-btn{width:36px;height:36px;border-radius:50%;background:var(--bg);box-shadow:var(--sh-sm);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text2);transition:all .15s;}
.io-btn:active{box-shadow:var(--sh-in);}

/* PAGES */
.page{display:none;flex:1;overflow-y:auto;padding:4px 20px 8px;flex-direction:column;gap:14px;}
.page.active{display:flex;}
.page::-webkit-scrollbar{width:0;}

/* PROGRESS */
.prog-card{background:var(--bg);box-shadow:var(--sh-card);border-radius:var(--r-xl);padding:20px 22px;}
.prog-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;}
.prog-label{font-size:12px;font-weight:500;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;}
.prog-num{font-family:'DM Serif Display',serif;font-size:30px;line-height:1;color:var(--text1);}
.prog-num small{font-size:16px;color:var(--text3);}
.prog-track{height:9px;background:var(--bg);box-shadow:var(--sh-in);border-radius:5px;position:relative;margin-bottom:13px;overflow:visible;}
.prog-bar{height:100%;border-radius:5px;background:linear-gradient(90deg,#50B888,#2A7050);transition:width .65s cubic-bezier(.34,1.4,.64,1);position:relative;box-shadow:0 2px 8px var(--green-glow);}
.prog-bar::after{content:'';position:absolute;right:-6px;top:-5px;width:19px;height:19px;border-radius:50%;background:linear-gradient(135deg,#5CC490,#2A7050);box-shadow:0 2px 8px var(--green-glow),0 0 0 3px var(--bg);}
.prog-hint{font-size:13px;color:var(--text2);}

.sec-row{display:flex;align-items:center;justify-content:space-between;padding:0 4px;}
.sec-lbl{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;}

/* HABIT CARDS — ③ no visible handle, long-press to drag */
.hlist{display:flex;flex-direction:column;gap:11px;}
.hcard{background:var(--bg);box-shadow:var(--sh-card);border-radius:var(--r-lg);padding:15px 17px;display:flex;align-items:center;gap:13px;transition:box-shadow .2s;user-select:none;}
.hcard.done{box-shadow:var(--sh-sm);}
.hcard.dragging{opacity:.45;box-shadow:var(--sh-in);}
.hcard.drag-over{box-shadow:0 0 0 2px var(--green),var(--sh-sm);}
.h-ico{width:46px;height:46px;border-radius:var(--r-md);background:var(--bg);box-shadow:var(--sh-sm);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;transition:box-shadow .2s;}
.hcard.done .h-ico{box-shadow:var(--sh-in);}
.h-mid{flex:1;min-width:0;cursor:pointer;}
.h-nm{font-family:'DM Serif Display',serif;font-size:16px;color:var(--text1);margin-bottom:5px;line-height:1.2;}
.hcard.done .h-nm{color:var(--green);}
.h-badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
.h-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.icon-btn{width:30px;height:30px;border-radius:50%;background:var(--bg);box-shadow:var(--sh-sm);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text3);transition:all .15s;}
.icon-btn:active{box-shadow:var(--sh-in);}
.h-ring{width:36px;height:36px;border-radius:50%;background:var(--bg);box-shadow:var(--sh-out);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .3s cubic-bezier(.34,1.4,.64,1);}
.hcard.done .h-ring{background:linear-gradient(135deg,#50B888,#2A7050);box-shadow:2px 3px 10px var(--green-glow);}
.h-ring svg{opacity:0;transform:scale(.4);transition:all .25s;width:16px;height:16px;}
.hcard.done .h-ring svg{opacity:1;transform:scale(1);}

/* ADD BTN */
.add-btn{display:flex;align-items:center;justify-content:center;gap:9px;padding:14px;background:var(--bg);box-shadow:var(--sh-sm);border-radius:var(--r-lg);border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;width:100%;transition:all .2s;}
.add-btn:hover{color:var(--green);}
.add-btn:active{box-shadow:var(--sh-in);}
.add-ico{width:26px;height:26px;border-radius:50%;background:var(--green-light);color:var(--green);display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;}

/* NAV */
.nav{flex-shrink:0;padding:10px 20px 22px;display:flex;gap:10px;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:11px 4px;background:var(--bg);box-shadow:var(--sh-out);border-radius:var(--r-lg);border:none;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;color:var(--text3);cursor:pointer;transition:all .2s;}
.nav-btn.active{color:var(--green);box-shadow:var(--sh-in);}
.nav-ico{font-size:20px;line-height:1;}

/* SEG */
.seg{display:flex;background:var(--bg);box-shadow:var(--sh-in);border-radius:40px;padding:4px;}
.seg-btn{flex:1;padding:9px;border-radius:36px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text2);background:transparent;cursor:pointer;transition:all .2s;}
.seg-btn.active{background:var(--bg);box-shadow:var(--sh-out);color:var(--green);font-weight:600;}

/* ④ REWARD POOL BANNER */
.pool-banner{background:var(--bg);box-shadow:var(--sh-card);border-radius:var(--r-xl);padding:18px 22px;display:flex;align-items:center;justify-content:space-between;}
.pool-left{}
.pool-label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.pool-val{font-family:'DM Serif Display',serif;font-size:34px;color:var(--text1);line-height:1;}
.pool-sub{font-size:12px;color:var(--text2);margin-top:3px;}
.pool-icon{font-size:40px;opacity:.15;}

/* REWARD CARDS */
.wcard{background:var(--bg);box-shadow:var(--sh-card);border-radius:var(--r-lg);padding:18px 20px;transition:all .2s;cursor:pointer;user-select:none;}
.wcard:active{box-shadow:var(--sh-sm);}
.wcard.archived{box-shadow:var(--sh-sm);opacity:.7;cursor:default;}
.wcard.dragging{opacity:.45;box-shadow:var(--sh-in);}
.wcard.drag-over{box-shadow:0 0 0 2px var(--green),var(--sh-sm);}
.w-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.w-ico{width:44px;height:44px;border-radius:var(--r-md);background:var(--bg);box-shadow:var(--sh-sm);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.w-info{flex:1;min-width:0;}
.w-nm{font-family:'DM Serif Display',serif;font-size:16px;color:var(--text1);margin-bottom:3px;line-height:1.2;}
.w-sub{font-size:12px;color:var(--text2);}
.w-sub b{color:var(--green);font-weight:600;}
.w-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
.w-track{height:6px;background:var(--bg);box-shadow:var(--sh-in);border-radius:3px;overflow:hidden;margin-bottom:11px;}
.w-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#50B888,#2A7050);transition:width .5s ease;}
.w-foot{display:flex;align-items:center;justify-content:space-between;}
.w-pct{font-size:12px;color:var(--text2);}
.w-pct b{color:var(--green);font-weight:600;}
.w-allocated{font-size:12px;color:var(--text2);}
.w-allocated b{color:var(--green);font-weight:600;}
.arch-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;color:var(--green);background:var(--green-light);padding:4px 10px;border-radius:20px;}
.reuse-btn{padding:6px 14px;border-radius:40px;border:none;background:var(--bg);box-shadow:var(--sh-sm);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;}

/* HISTORY */
.hst-item{background:var(--bg);box-shadow:var(--sh-sm);border-radius:var(--r-md);padding:13px 15px;display:flex;align-items:center;gap:12px;}
.hst-ico{width:38px;height:38px;border-radius:var(--r-sm);background:var(--bg);box-shadow:var(--sh-sm);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.hst-body{flex:1;}
.hst-nm{font-size:14px;font-weight:500;color:var(--text1);}
.hst-t{font-size:11px;color:var(--text3);margin-top:2px;}
.hst-val{font-family:'DM Serif Display',serif;font-size:17px;}
.hst-val.earn{color:var(--green);}
.hst-val.spend{color:#C97070;}

/* DETAIL VIEW (habit) */
#dtl{display:none;flex-direction:column;background:var(--bg);position:absolute;inset:0;z-index:10;overflow-y:auto;}
#dtl::-webkit-scrollbar{width:0;}
#dtl.open{display:flex;}
.dtl-top{padding:20px 22px 14px;display:flex;align-items:center;gap:15px;flex-shrink:0;}
.bk-btn{width:42px;height:42px;border-radius:50%;background:var(--bg);box-shadow:var(--sh-out);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text2);transition:all .15s;flex-shrink:0;}
.bk-btn:active{box-shadow:var(--sh-in);}
.dtl-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text1);flex:1;line-height:1.2;}
.dtl-body{padding:4px 20px 32px;display:flex;flex-direction:column;gap:14px;}
.stat-row{display:flex;gap:11px;}
.stat-c{flex:1;background:var(--bg);box-shadow:var(--sh-card);border-radius:var(--r-lg);padding:14px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
.stat-v{font-family:'DM Serif Display',serif;font-size:15px;color:var(--text1);line-height:1;text-align:center;word-break:break-all;}
.stat-l{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.04em;text-align:center;}
.cal-card{background:var(--bg);box-shadow:var(--sh-card);border-radius:var(--r-xl);padding:20px;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-mo{font-family:'DM Serif Display',serif;font-size:18px;color:var(--text1);}
.cal-arr{width:34px;height:34px;border-radius:50%;background:var(--bg);box-shadow:var(--sh-sm);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text2);transition:all .15s;}
.cal-arr:active{box-shadow:var(--sh-in);}
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dw{font-size:10px;font-weight:600;color:var(--text3);text-align:center;padding:2px 0 7px;letter-spacing:.04em;}
.cal-d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text2);border-radius:50%;}
.cal-d.other{color:var(--text3);opacity:.45;}
.cal-d.checked{background:linear-gradient(135deg,#50B888,#2A7050);color:#fff;font-weight:500;box-shadow:1px 2px 7px var(--green-glow);}
.cal-d.today{font-weight:600;color:var(--green);background:var(--bg);box-shadow:var(--sh-sm);}
.cal-d.checked.today{background:linear-gradient(135deg,#50B888,#2A7050);color:#fff;box-shadow:1px 2px 9px var(--green-glow);}
.dtl-actions{display:flex;gap:10px;}
.dtl-btn{flex:1;padding:13px;background:var(--bg);box-shadow:var(--sh-sm);border-radius:var(--r-lg);border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .2s;}
.dtl-btn:hover{color:var(--green);}
.dtl-btn:active{box-shadow:var(--sh-in);}
.dtl-btn.danger:hover{color:#C97070;}

/* ④ REWARD DETAIL VIEW */
#wdtl{display:none;flex-direction:column;background:var(--bg);position:absolute;inset:0;z-index:10;overflow-y:auto;}
#wdtl::-webkit-scrollbar{width:0;}
#wdtl.open{display:flex;}
.wdtl-hdr{padding:20px 22px 14px;display:flex;align-items:center;gap:15px;flex-shrink:0;}
.wdtl-hdr-right{margin-left:auto;display:flex;align-items:center;gap:6px;}
.pool-chip{display:flex;align-items:center;gap:6px;background:var(--bg);box-shadow:var(--sh-out);border-radius:40px;padding:7px 14px 7px 10px;}
.pool-chip-orb{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#50B888,#2A7050);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;}
.pool-chip-val{font-size:14px;font-weight:600;color:var(--text1);}
.wdtl-body{padding:4px 20px 32px;display:flex;flex-direction:column;gap:16px;}
.wdtl-hero{background:var(--bg);box-shadow:var(--sh-card);border-radius:var(--r-xl);padding:22px;display:flex;align-items:center;gap:16px;}
.wdtl-ico{width:60px;height:60px;border-radius:18px;background:var(--bg);box-shadow:var(--sh-sm);display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0;}
.wdtl-info{flex:1;}
.wdtl-name{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text1);line-height:1.2;margin-bottom:6px;}
.wdtl-cost{font-size:13px;color:var(--text2);}
.wdtl-cost b{color:var(--green);font-weight:600;}
.wdtl-progress-card{background:var(--bg);box-shadow:var(--sh-card);border-radius:var(--r-xl);padding:20px;}
.wdtl-prog-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;}
.wdtl-prog-lbl{font-size:12px;font-weight:500;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;}
.wdtl-prog-frac{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text1);}
.wdtl-track{height:9px;background:var(--bg);box-shadow:var(--sh-in);border-radius:5px;position:relative;margin-bottom:12px;overflow:visible;}
.wdtl-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#50B888,#2A7050);transition:width .5s ease;position:relative;box-shadow:0 2px 8px var(--green-glow);}
.wdtl-fill::after{content:'';position:absolute;right:-6px;top:-5px;width:19px;height:19px;border-radius:50%;background:linear-gradient(135deg,#5CC490,#2A7050);box-shadow:0 2px 8px var(--green-glow),0 0 0 3px var(--bg);}
.wdtl-hint{font-size:13px;color:var(--text2);}
.alloc-card{background:var(--bg);box-shadow:var(--sh-card);border-radius:var(--r-xl);padding:20px;display:flex;flex-direction:column;gap:14px;}
.alloc-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--text1);}
.alloc-input-row{display:flex;align-items:center;gap:12px;}
.alloc-input{flex:1;padding:13px 16px;background:var(--bg);box-shadow:var(--sh-in);border-radius:var(--r-md);border:none;font-family:'DM Serif Display',serif;font-size:24px;text-align:center;color:var(--text1);outline:none;-webkit-appearance:none;appearance:none;}
.alloc-input:focus{box-shadow:var(--sh-in),0 0 0 2px rgba(58,140,106,.22);}
.alloc-btn{padding:13px 18px;border-radius:var(--r-md);border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;}
.alloc-btn.primary{background:linear-gradient(135deg,#50B888,#2A7050);color:#fff;box-shadow:2px 3px 10px var(--green-glow);}
.alloc-btn.primary:active{box-shadow:inset 2px 2px 6px rgba(0,0,0,.15);}
.alloc-btn.primary:disabled{background:var(--bg);box-shadow:var(--sh-sm);color:var(--text3);cursor:not-allowed;}
.alloc-btn.secondary{background:var(--bg);box-shadow:var(--sh-out);color:var(--green);}
.alloc-btn.secondary:active{box-shadow:var(--sh-in);}
.alloc-btn.secondary:disabled{color:var(--text3);cursor:not-allowed;}
.alloc-hint{font-size:12px;color:var(--text3);}
.wdtl-actions{display:flex;gap:10px;}

/* MODALS */
.mwrap{display:none;position:absolute;inset:0;z-index:20;background:rgba(38,45,61,.32);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);align-items:flex-end;}
.mwrap.open{display:flex;}
.modal{background:var(--bg);border-radius:var(--r-xl) var(--r-xl) 0 0;padding:20px 22px 36px;width:100%;display:flex;flex-direction:column;gap:15px;max-height:90vh;overflow-y:auto;box-shadow:0 -6px 30px rgba(0,0,0,.07);}
.modal::-webkit-scrollbar{width:0;}
.m-handle{width:34px;height:4px;border-radius:2px;background:var(--text3);margin:0 auto -2px;opacity:.4;}
.m-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text1);}
.m-lbl{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;}
.m-input{width:100%;padding:14px 16px;background:var(--bg);box-shadow:var(--sh-in);border-radius:var(--r-md);border:none;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text1);outline:none;-webkit-appearance:none;appearance:none;}
.m-input::placeholder{color:var(--text3);}
.m-input:focus{box-shadow:var(--sh-in),0 0 0 2px rgba(58,140,106,.22);}
.m-input-num{text-align:center;font-family:'DM Serif Display',serif;font-size:26px;}
.ecat-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;}
.ecat-tabs::-webkit-scrollbar{height:0;}
.ecat-tab{flex-shrink:0;padding:5px 12px;border-radius:20px;border:none;background:var(--bg);box-shadow:var(--sh-sm);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;}
.ecat-tab.active{background:var(--green-light);color:var(--green);box-shadow:var(--sh-in);}
.egrid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;}
.eopt{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--bg);box-shadow:var(--sh-sm);border-radius:var(--r-sm);cursor:pointer;border:none;transition:all .15s;}
.eopt:active,.eopt.sel{box-shadow:var(--sh-in);background:var(--green-light);}
.nrow{display:flex;align-items:center;gap:16px;}
.nbtn{width:40px;height:40px;border-radius:50%;background:var(--bg);box-shadow:var(--sh-out);border:none;font-size:22px;color:var(--text1);display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1;transition:all .15s;}
.nbtn:active{box-shadow:var(--sh-in);}
.nval{font-family:'DM Serif Display',serif;font-size:32px;color:var(--text1);min-width:50px;text-align:center;flex:1;}
.mactions{display:flex;gap:12px;margin-top:4px;}
.btn-c{flex:1;padding:14px;background:var(--bg);box-shadow:var(--sh-out);border:none;border-radius:var(--r-lg);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;}
.btn-c:active{box-shadow:var(--sh-in);}
.btn-s{flex:2;padding:14px;background:linear-gradient(135deg,#50B888,#2A7050);box-shadow:3px 4px 12px var(--green-glow);border:none;border-radius:var(--r-lg);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:#fff;cursor:pointer;transition:all .2s;}
.btn-s:active{box-shadow:inset 2px 2px 6px rgba(0,0,0,.15);}
.btn-s:disabled{background:var(--bg);box-shadow:var(--sh-sm);color:var(--text3);cursor:not-allowed;}
.center-modal{background:var(--bg);border-radius:var(--r-xl);padding:24px 22px;width:calc(100% - 40px);margin:0 auto;box-shadow:var(--sh-card);display:flex;flex-direction:column;gap:14px;max-height:80vh;overflow-y:auto;}
.center-modal-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--text1);}
.center-modal-msg{font-size:14px;color:var(--text2);line-height:1.6;}
.btn-danger{flex:1;padding:13px;background:var(--bg);box-shadow:var(--sh-out);border:none;border-radius:var(--r-lg);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:#C97070;cursor:pointer;transition:all .15s;}
.btn-danger:active{box-shadow:var(--sh-in);}
.io-textarea{width:100%;height:110px;padding:12px 14px;background:var(--bg);box-shadow:var(--sh-in);border-radius:var(--r-md);border:none;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text1);outline:none;resize:none;line-height:1.5;}

#toast{position:absolute;bottom:98px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--text1);color:#fff;font-size:13px;font-weight:500;padding:10px 22px;border-radius:40px;box-shadow:0 4px 20px rgba(38,45,61,.22);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:50;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.empty{text-align:center;padding:40px 0;font-size:13px;color:var(--text3);}
</style>
</head>
<body>
<div id="app">

  <div class="hdr">
    <div>
      <div class="brand-name">Habits <em>Tracker</em></div>
      <div class="brand-sub" id="bdate"></div>
    </div>
    <div class="hdr-right">
      <button class="io-btn" onclick="openIO()">⇅</button>
      <button class="coin-pill" onclick="switchTab('history')">
        <div class="coin-orb">★</div>
        <div class="coin-val" id="coins">0</div>
      </button>
    </div>
  </div>

  <!-- HABITS PAGE -->
  <div class="page active" id="page-habits">
    <div class="prog-card">
      <div class="prog-top">
        <div class="prog-label">今日进度</div>
        <div class="prog-num"><span id="pdone">0</span><small> / <span id="ptotal">0</span></small></div>
      </div>
      <div class="prog-track"><div class="prog-bar" id="pbar" style="width:0%"></div></div>
      <div class="prog-hint" id="phint">从第一个习惯开始今天吧</div>
    </div>
    <div class="sec-row"><div class="sec-lbl">活跃习惯</div></div>
    <div class="hlist" id="hlist"></div>
    <button class="add-btn" onclick="openHM(null)"><span class="add-ico">+</span>添加习惯</button>
    <div class="sec-row" style="margin-top:4px;"><div class="sec-lbl">已归档</div></div>
    <div class="hlist" id="hlist-archived"></div>
  </div>

  <!-- REWARDS PAGE -->
  <div class="page" id="page-wishes">
    <div class="pool-banner">
      <div class="pool-left">
        <div class="pool-label">奖励池余额</div>
        <div class="pool-val" id="pool-val">0 <span style="font-size:20px;">★</span></div>
        <div class="pool-sub" id="pool-sub">点击奖励项目进行分配</div>
      </div>
      <div class="pool-icon">★</div>
    </div>
    <div class="seg">
      <button class="seg-btn active" id="ws-active" onclick="switchWS('active')">进行中</button>
      <button class="seg-btn" id="ws-archive" onclick="switchWS('archive')">已完成</button>
    </div>
    <div id="wlist"></div>
    <button class="add-btn" onclick="openWM(null)"><span class="add-ico">+</span>添加奖励</button>
  </div>

  <!-- HISTORY PAGE -->
  <div class="page" id="page-history">
    <div id="hstlist"></div>
  </div>

  <!-- NAV -->
  <div class="nav">
    <button class="nav-btn active" id="tab-habits" onclick="switchTab('habits')"><span class="nav-ico">🌿</span>习惯</button>
    <button class="nav-btn" id="tab-wishes" onclick="switchTab('wishes')"><span class="nav-ico">⭐</span>奖励</button>
    <button class="nav-btn" id="tab-history" onclick="switchTab('history')"><span class="nav-ico">📋</span>记录</button>
  </div>

  <!-- HABIT DETAIL -->
  <div id="dtl">
    <div class="dtl-top">
      <button class="bk-btn" onclick="closeDtl()">‹</button>
      <div class="dtl-title" id="dtl-title">习惯详情</div>
    </div>
    <div class="dtl-body">
      <div class="stat-row">
        <div class="stat-c"><div class="stat-v" id="ds">—</div><div class="stat-l">打卡起始</div></div>
        <div class="stat-c"><div class="stat-v" id="dt">0</div><div class="stat-l">累计打卡</div></div>
        <div class="stat-c"><div class="stat-v" id="dk">0</div><div class="stat-l">连续天数</div></div>
      </div>
      <div class="cal-card">
        <div class="cal-nav">
          <button class="cal-arr" onclick="calP()">‹</button>
          <div class="cal-mo" id="calmo"></div>
          <button class="cal-arr" onclick="calN()">›</button>
        </div>
        <div class="cal-g" id="calg"></div>
      </div>
      <div class="dtl-actions">
        <button class="dtl-btn" onclick="editFromDtl()">编辑</button>
        <button class="dtl-btn" id="arch-btn" onclick="archCur()">归档</button>
        <button class="dtl-btn danger" onclick="deleteFromDtl()">删除</button>
      </div>
    </div>
  </div>

  <!-- ④ REWARD DETAIL -->
  <div id="wdtl">
    <div class="wdtl-hdr">
      <button class="bk-btn" onclick="closeWDtl()">‹</button>
      <div class="dtl-title" id="wdtl-title">奖励详情</div>
      <div class="wdtl-hdr-right">
        <div class="pool-chip">
          <div class="pool-chip-orb">★</div>
          <div class="pool-chip-val" id="wdtl-pool">0</div>
        </div>

    </div>
    <div class="wdtl-body">
      <div class="wdtl-hero">
        <div class="wdtl-ico" id="wdtl-ico">🎁</div>
        <div class="wdtl-info">
          <div class="wdtl-name" id="wdtl-name">奖励</div>
          <div class="wdtl-cost">目标 <b id="wdtl-cost">0</b> ★ · 已分配 <b id="wdtl-alloc">0</b> ★</div>

      </div>
      <div class="wdtl-progress-card">
        <div class="wdtl-prog-top">
          <div class="wdtl-prog-lbl">分配进度</div>
          <div class="wdtl-prog-frac"><span id="wdtl-pct">0</span>%</div>
        </div>
        <div class="wdtl-track"><div class="wdtl-fill" id="wdtl-fill" style="width:0%"></div></div>
        <div class="wdtl-hint" id="wdtl-hint">还需分配 0 ★ 即可兑换</div>

      <div class="alloc-card">

      <div class="wdtl-actions">

        <button class="dtl-btn" id="wdtl-redeem-btn" onclick="redeemFromDtl()">兑换奖励</button>

  <!-- HABIT MODAL -->

        <button class="nbtn" onclick="adj('r',1)">+</button>
      </div>
      <div class="mactions">
        <button class="btn-c" onclick="cm('hm')">取消</button>
        <button class="btn-s" id="hs" onclick="saveH()" disabled>保存</button>
      </div>
    </div>
  </div>

  <!-- REWARD MODAL -->
  <div class="mwrap" id="wm">
    <div class="modal">
      <div class="m-handle"></div>
      <div class="m-title" id="wm-title">新建奖励</div>
      <div class="m-lbl">奖励名称</div>
      <input class="m-input" id="wn" placeholder="例：买一双新球鞋" maxlength="16">
      <div class="m-lbl">图标</div>
      <div class="ecat-tabs" id="w-cat-tabs"></div>
      <div class="egrid" id="weg"></div>
      <div class="m-lbl">兑换所需 ★（直接填写）</div>
      <input class="m-input m-input-num" id="wv-input" type="number" min="1" max="9999" placeholder="20" inputmode="numeric" oninput="wc=Math.max(1,parseInt(this.value)||1);chkW();">
      <div class="mactions">
        <button class="btn-c" onclick="cm('wm')">取消</button>
        <button class="btn-s" id="ws" onclick="saveW()" disabled>保存</button>
      </div>
    </div>
  </div>

  <!-- CONFIRM MODAL -->
  <div class="mwrap" id="cfm" style="align-items:center;">
    <div class="center-modal">
      <div class="center-modal-title" id="cfm-title">确认删除</div>
      <div class="center-modal-msg" id="cfm-msg">此操作不可撤销。</div>
      <div class="mactions">
        <button class="btn-c" onclick="cm('cfm')">取消</button>
        <button class="btn-danger" id="cfm-ok">确认删除</button>
      </div>

  <!-- IO MODAL -->
  <div class="mwrap" id="io-modal" style="align-items:center;">
    <div class="center-modal">
      <div class="center-modal-title">数据备份 / 迁移</div>
      <div class="center-modal-msg">复制下方数据保存，或粘贴到新设备导入。</div>
      <div class="m-lbl">导出</div>
      <textarea class="io-textarea" id="io-export" readonly onclick="this.select()"></textarea>
      <button class="btn-s" style="flex:none;" onclick="copyExport()">复制数据</button>
      <div style="height:1px;background:var(--text3);opacity:.15;"></div>
      <div class="m-lbl">导入（粘贴后点导入）</div>
      <textarea class="io-textarea" id="io-import" placeholder="将导出的数据粘贴到这里…"></textarea>
      <div class="mactions">
        <button class="btn-c" onclick="cm('io-modal')">关闭</button>
        <button class="btn-s" onclick="doImport()">导入数据</button>

    </div>
  </div>

  <div id="toast"></div>
</div>

<script>
// ② UPDATED EMOJI CATEGORIES
const ECATS=[
  {label:'运动',emojis:['🏃','💪','🧘','🚴','🏊','🤸','⛹️','🏋️','🚶','🧗','🏄','⛷️','🎾','⚽','🏀','🎯','🥊','🤾','🏇','🚵','🧜','🤽','🏂','🤺','🏌️']},
  {label:'饮食',emojis:['💧','🥗','🍎','🥦','🥕','🍵','🧃','🥤','🍳','🥑','🫐','🍇','🥝','🌽','🍱','🥣','🍜','🧆','🫚','🍽️']},
  {label:'学习',emojis:['📚','✍️','📝','🎓','🔬','📐','💡','🖊️','📖','🗒️','📊','🧮','🔭','📏','🗂️','📋','🧩','♟️','🖥️','📓']},
  {label:'生活',emojis:['😴','🦷','🧴','🪥','🛁','🧹','🛏️','⏰','🌿','☀️','🌙','🕯️','🪴','🧺','🧼','🫧','🪞','🏠','🌅','🌊','🧑','👩','👨','🧒','👧','👦','🧓','👴','👵','🫂']},
  {label:'工作',emojis:['🧠','📅','✅','📧','💼','🗓️','📌','📎','🖨️','💻','🖱️','⌨️','📞','📠','🗃️','📤','📥','🔑','🏆','🎯']},
  {label:'娱乐',emojis:['🎵','🎮','📱','🎨','🎬','🎸','🎹','🎷','🎺','🎭','📷','🎲','🃏','🎪','🎡','🎢','🎠','🎤','🎧','📻','🎻']},
  {label:'出行',emojis:['✈️','🚗','🚂','🚢','🏖️','🌴','⛺','🗺️','🧳','🎒','🏕️','🗼','🏔️','🌋','🏝️','🌏','🚀','🛸','🚁','⛵']},
  {label:'购物',emojis:['👟','👜','💄','🛍️','🧸','💎','👗','👒','⌚','💍','🕶️','👠','🎁','🧣','🧤','👔','💅','🪮','🛒','💰']},
  {label:'植物',emojis:['🌱','🌿','🍃','🌸','🌺','🌻','🌹','🌷','🍀','🌾','🪷','🌵','🎋','🎍','🪨','🌰','🍂','🍁','🌳','🪸']},
  {label:'设备',emojis:['📱','💻','🖥️','⌚','📷','🎧','🔋','💡','🔌','📡','🖨️','📺','📻','🎙️','🔦','🧲','⚙️','🔧','🖱️','📟']},
];

// ① STAR TIER
function starClass(n){return n<=3?'star-green':n<=7?'star-blue':n<=12?'star-purple':'star-gold';}
function starColor(n){return n<=3?'#3A8C6A':n<=7?'#5478C8':n<=12?'#8B5EC4':'#C9960A';}
function starBg(n){return n<=3?'#E4F2EC':n<=7?'#EAF0FA':n<=12?'#F0EAF8':'#FDF6E0';}

const PAL=[
  {m:'#3A8C6A',b:'#E4F2EC'},{m:'#5478C8',b:'#EAF0FA'},
  {m:'#8B5EC4',b:'#F0EAF8'},{m:'#C4715A',b:'#F8EDE9'},
  {m:'#B8863A',b:'#F8F0E2'},{m:'#5A93B0',b:'#E8F2F8'},
];
const TODAY=new Date(),TKEY=fmt(TODAY);
function fmt(d){return d.toISOString().slice(0,10);}

let habits=JSON.parse(localStorage.getItem('hs5_h')||'null')||[
  {id:1,name:'喝8杯水',icon:'💧',color:PAL[0],reward:2,startDate:'2025-03-01',checks:{},streak:7,totalChecks:18,archived:false},
  {id:2,name:'运动30分钟',icon:'🏃',color:PAL[1],reward:5,startDate:'2025-03-05',checks:{},streak:3,totalChecks:9,archived:false},
  {id:3,name:'阅读20页',icon:'📚',color:PAL[2],reward:3,startDate:'2025-02-20',checks:{},streak:12,totalChecks:24,archived:false},
];
// ④ wishes now have allocated field; coins = pool balance
let wishes=JSON.parse(localStorage.getItem('hs5_w')||'null')||[
  {id:1,name:'买一双新球鞋',icon:'👟',cost:50,allocated:0,archived:false},
  {id:2,name:'看一场电影',icon:'🎬',cost:20,allocated:0,archived:false},
];
let coins=parseInt(localStorage.getItem('hs5_c')||'0'); // pool balance
let ckd=JSON.parse(localStorage.getItem('hs5_ck_'+TKEY)||'[]');
let log=JSON.parse(localStorage.getItem('hs5_lg')||'[]');

function persist(){
  localStorage.setItem('hs5_h',JSON.stringify(habits));
  localStorage.setItem('hs5_w',JSON.stringify(wishes));
  localStorage.setItem('hs5_c',coins);
  localStorage.setItem('hs5_ck_'+TKEY,JSON.stringify(ckd));
  localStorage.setItem('hs5_lg',JSON.stringify(log));
}
function toast(m){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2300);
}

document.getElementById('bdate').textContent=TODAY.toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'long'});

function switchTab(tab){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='wishes')renderW();
  if(tab==='history')renderHst();
  if(tab==='habits')renderH();
}

const MSGS=['从第一个习惯开始今天吧','很好，已经起步了 ✦','节奏不错，继续','已完成一半以上','只差最后一步了','全部完成，今天很棒 ✦'];
function palFor(h){return h.color||PAL[habits.indexOf(h)%PAL.length];}

// ③ LONG-PRESS DRAG — no visible handle
// ── DRAG REORDER (touch long-press + desktop drag) ──
let _lpTimer=null,_ghost=null,_dragIdx=null,_dragList=null,_dragCb=null,_dragParent=null,_startY=0,_offsetY=0;

function _clearGhost(){
  if(_ghost){_ghost.remove();_ghost=null;}
  if(_dragParent){
    [..._dragParent.children].forEach(c=>c.style.opacity='');
    _dragParent=null;
  }
  _dragIdx=null;_dragList=null;_dragCb=null;
}

function setupDrag(card,idx,list,cb){
  // Touch: long-press activates, then drag
  card.addEventListener('touchstart',e=>{
    const t=e.touches[0];
    _startY=t.clientY;
    _lpTimer=setTimeout(()=>{
      navigator.vibrate&&navigator.vibrate([20]);
      _dragIdx=idx;_dragList=list;_dragCb=cb;_dragParent=card.parentElement;
      // create ghost
      const r=card.getBoundingClientRect();
      _offsetY=t.clientY-r.top;
      _ghost=card.cloneNode(true);
      Object.assign(_ghost.style,{
        position:'fixed',left:r.left+'px',top:r.top+'px',
        width:r.width+'px',zIndex:99,pointerEvents:'none',
        opacity:'.92',transform:'scale(1.03)',
        boxShadow:'0 12px 32px rgba(0,0,0,.18)',
        transition:'none',borderRadius:'var(--r-lg)',
      });
      document.body.appendChild(_ghost);
      card.style.opacity='.3';
    },420);
  },{passive:true});

  card.addEventListener('touchmove',e=>{
    // cancel long-press if finger moved before activation
    if(!_ghost){
      if(Math.abs(e.touches[0].clientY-_startY)>8) clearTimeout(_lpTimer);
      return;
    }
    e.preventDefault();
    const t=e.touches[0];
    // move ghost
    _ghost.style.top=(t.clientY-_offsetY)+'px';
    // find which card the finger is over
    _ghost.style.display='none';
    const el=document.elementFromPoint(t.clientX,t.clientY);
    _ghost.style.display='';
    if(!el)return;
    const target=el.closest('.hcard,.wcard');
    if(!target||target===card||!_dragParent.contains(target))return;
    const siblings=[..._dragParent.children].filter(c=>c.classList.contains('hcard')||c.classList.contains('wcard'));
    const ti=siblings.indexOf(target);
    if(ti<0||ti===_dragIdx)return;
    const item=_dragList.splice(_dragIdx,1)[0];
    _dragList.splice(ti,0,item);
    _dragIdx=ti;
    persist();_dragCb();
    // after re-render card ref is stale — find new card at same index
    setTimeout(()=>{
      const newCards=[..._dragParent.children].filter(c=>c.classList.contains('hcard')||c.classList.contains('wcard'));
      if(newCards[_dragIdx]) newCards[_dragIdx].style.opacity='.3';
    },0);
  },{passive:false});

  card.addEventListener('touchend',()=>{
    clearTimeout(_lpTimer);
    _clearGhost();
  });
  card.addEventListener('touchcancel',()=>{
    clearTimeout(_lpTimer);
    _clearGhost();
  });

  // Desktop drag
  card.draggable=true;
  card.addEventListener('dragstart',e=>{
    _dragIdx=idx;_dragList=list;_dragCb=cb;
    card.classList.add('dragging');
  });
  card.addEventListener('dragend',()=>{card.classList.remove('dragging');_dragIdx=null;});
  card.addEventListener('dragover',e=>{
    e.preventDefault();
    if(_dragIdx===null||_dragIdx===idx)return;
    const item=_dragList.splice(_dragIdx,1)[0];
    _dragList.splice(idx,0,item);
    _dragIdx=idx;persist();_dragCb();
  });
}

// ── RENDER HABITS ──
function renderH(){
  const active=habits.filter(h=>!h.archived);
  const archived=habits.filter(h=>h.archived);
  const list=document.getElementById('hlist');
  list.innerHTML='';
  if(!active.length)list.innerHTML='<div class="empty">还没有习惯，添加第一个吧</div>';
  active.forEach((h,idx)=>{
    const done=ckd.includes(h.id);
    const sc=starClass(h.reward),sg=starColor(h.reward),sb=starBg(h.reward);
    const card=document.createElement('div');
    card.className='hcard'+(done?' done':'');
    card.innerHTML=`
      <div class="h-ico">${h.icon}</div>
      <div class="h-mid" onclick="openDtl(${h.id})">
        <div class="h-nm">${h.name}</div>
        <div class="h-badge ${sc}" style="color:${sg};background:${sb};">★ +${h.reward}</div>
      </div>
      <div class="h-actions">
        <button class="icon-btn" onclick="event.stopPropagation();openHM(${h.id})">✎</button>
        <div class="h-ring" onclick="toggle(${h.id})">
          <svg viewBox="0 0 16 16" fill="none"><path d="M3 8.5l3.5 3.5 6.5-7.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>`;
    setupDrag(card,idx,active,()=>{active.forEach(h2=>{const i=habits.findIndex(x=>x.id===h2.id);if(i>-1)habits[i]=h2;});renderH();});
    list.appendChild(card);
  });
  const alist=document.getElementById('hlist-archived');
  alist.innerHTML='';
  if(!archived.length)alist.innerHTML='<div class="empty" style="padding:12px 0;">暂无归档习惯</div>';
  archived.forEach(h=>{
    const sg=starColor(h.reward),sb=starBg(h.reward);
    const card=document.createElement('div');
    card.className='hcard';card.style.opacity='.6';
    card.innerHTML=`
      <div class="h-ico">${h.icon}</div>
      <div class="h-mid" onclick="openDtl(${h.id})">
        <div class="h-nm" style="color:var(--text2);">${h.name}</div>
        <div class="h-badge" style="color:${sg};background:${sb};">★ +${h.reward}</div>
      </div>
      <div class="h-actions"><button class="icon-btn" onclick="event.stopPropagation();openHM(${h.id})">✎</button></div>`;
    alist.appendChild(card);
  });
  const total=active.length,done=ckd.filter(id=>active.find(h=>h.id===id)).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('pbar').style.width=pct+'%';
  document.getElementById('pdone').textContent=done;
  document.getElementById('ptotal').textContent=total;
  document.getElementById('phint').textContent=MSGS[done===total&&total>0?5:Math.min(Math.floor(done/Math.max(total,1)*4.99),4)];
  document.getElementById('coins').textContent=coins;
}

function toggle(id){
  const h=habits.find(x=>x.id===id);if(!h)return;
  const i=ckd.indexOf(id);
  if(i===-1){
    ckd.push(id);coins+=h.reward;
    if(!h.checks)h.checks={};
    h.checks[TKEY]=true;
    h.totalChecks=(h.totalChecks||0)+1;
    h.streak=(h.streak||0)+1;
    log.unshift({type:'earn',name:h.name,icon:h.icon,coins:h.reward,time:new Date().toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})});
    toast('✦  +'+h.reward+' ★ 已入奖励池');
  }else{
    ckd.splice(i,1);coins=Math.max(0,coins-h.reward);
    if(h.checks)delete h.checks[TKEY];
    h.totalChecks=Math.max(0,(h.totalChecks||1)-1);
    h.streak=Math.max(0,(h.streak||1)-1);
    if(log.length&&log[0].type==='earn'&&log[0].name===h.name)log.shift();
    toast('已取消打卡');
  }
  persist();renderH();
}

// ── HABIT DETAIL ──
let did=null,cY=null,cM=null;
function openDtl(id){
  const h=habits.find(x=>x.id===id);if(!h)return;
  did=id;const now=new Date();cY=now.getFullYear();cM=now.getMonth();
  document.getElementById('dtl-title').textContent=h.icon+'  '+h.name;
  document.getElementById('ds').textContent=h.startDate||'—';
  document.getElementById('dt').textContent=h.totalChecks||0;
  document.getElementById('dk').textContent=h.streak||0;
  document.getElementById('arch-btn').textContent=h.archived?'恢复':'归档';
  renderCal();
  document.getElementById('dtl').classList.add('open');
}
function closeDtl(){document.getElementById('dtl').classList.remove('open');did=null;}
function editFromDtl(){const id=did;closeDtl();openHM(id);}
function archCur(){
  const h=habits.find(x=>x.id===did);if(!h)return;
  h.archived=!h.archived;persist();closeDtl();renderH();
  toast(h.archived?'已归档':'已恢复');
}
function deleteFromDtl(){
  const h=habits.find(x=>x.id===did);if(!h)return;
  showConfirm('删除习惯','「'+h.name+'」的所有数据将被永久删除。',()=>{
    habits=habits.filter(x=>x.id!==did);ckd=ckd.filter(x=>x!==did);
    persist();closeDtl();renderH();toast('已删除');
  });
}
function renderCal(){
  const h=habits.find(x=>x.id===did);if(!h)return;
  const g=document.getElementById('calg');g.innerHTML='';
  ['日','一','二','三','四','五','六'].forEach(d=>{const e=document.createElement('div');e.className='cal-dw';e.textContent=d;g.appendChild(e);});
  const first=new Date(cY,cM,1),last=new Date(cY,cM+1,0).getDate();
  for(let i=0;i<first.getDay();i++){const e=document.createElement('div');e.className='cal-d other';g.appendChild(e);}
  for(let d=1;d<=last;d++){
    const key=cY+'-'+String(cM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isT=key===TKEY,isC=!!(h.checks&&h.checks[key])||(isT&&ckd.includes(h.id));
    const e=document.createElement('div');
    e.className='cal-d'+(isC?' checked':'')+(isT?' today':'');
    e.textContent=d;g.appendChild(e);
  }
  const MOS=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  document.getElementById('calmo').textContent=cY+' · '+MOS[cM];
}
function calP(){cM--;if(cM<0){cM=11;cY--;}renderCal();}
function calN(){cM++;if(cM>11){cM=0;cY++;}renderCal();}

// ── REWARDS ──
let wseg='active';
function switchWS(s){
  wseg=s;
  document.getElementById('ws-active').classList.toggle('active',s==='active');
  document.getElementById('ws-archive').classList.toggle('active',s==='archive');
  renderW();
}
function renderW(){
  updatePool();
  const list=document.getElementById('wlist');list.innerHTML='';
  const active=wishes.filter(w=>!w.archived);
  const items=wseg==='active'?active:wishes.filter(w=>w.archived);
  if(!items.length){list.innerHTML='<div class="empty">这里还什么都没有</div>';return;}
  items.forEach((w,idx)=>{
    const alloc=w.allocated||0;
    const pct=Math.min(100,Math.round(alloc/w.cost*100));
    const card=document.createElement('div');
    card.className='wcard'+(w.archived?' archived':'');
    if(w.archived){
      card.innerHTML=`
        <div class="w-top">
          <div class="w-ico">${w.icon}</div>
          <div class="w-info"><div class="w-nm">${w.name}</div><div class="w-sub">花费 <b>★ ${w.cost}</b></div></div>
          <span class="arch-badge">✓ 已兑换</span>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;">
          <button class="reuse-btn" onclick="event.stopPropagation();reuse(${w.id})">重新使用</button>
          <button class="reuse-btn" style="color:#C97070;" onclick="event.stopPropagation();deleteWish(${w.id})">删除</button>
        </div>`;
    }else{
      card.onclick=()=>openWDtl(w.id);
      card.innerHTML=`
        <div class="w-top">
          <div class="w-ico">${w.icon}</div>
          <div class="w-info">
            <div class="w-nm">${w.name}</div>
            <div class="w-sub">目标 <b>★ ${w.cost}</b></div>
          </div>
          <div class="w-actions" onclick="event.stopPropagation()">
            <button class="icon-btn" style="width:28px;height:28px;font-size:13px;" onclick="openWM(${w.id})">✎</button>
            <button class="icon-btn" style="width:28px;height:28px;font-size:13px;color:#C97070;" onclick="deleteWish(${w.id})">✕</button>
          </div>
        </div>
        <div class="w-track"><div class="w-fill" style="width:${pct}%"></div></div>
        <div class="w-foot">
          <div class="w-allocated">已分配 <b>★ ${alloc}</b> / ${w.cost}</div>
          <div class="w-pct"><b>${pct}%</b></div>
        </div>`;
      setupDrag(card,idx,active,()=>{active.forEach(w2=>{const i=wishes.findIndex(x=>x.id===w2.id);if(i>-1)wishes[i]=w2;});renderW();});
    }
    list.appendChild(card);
  });
}
function updatePool(){
  document.getElementById('pool-val').innerHTML=coins+' <span style="font-size:20px;">★</span>';
  document.getElementById('pool-sub').textContent=coins>0?'点击奖励项目进行分配':'打卡后星星将累积在这里';
  document.getElementById('coins').textContent=coins;
}
function reuse(id){
  const w=wishes.find(x=>x.id===id);if(!w)return;
  w.archived=false;w.allocated=0;persist();renderW();toast('奖励已重新激活');
}
function deleteWish(id){
  const w=wishes.find(x=>x.id===id);if(!w)return;
  showConfirm('删除奖励','「'+w.name+'」将被永久删除。',()=>{
    // return allocated stars to pool
    if(!w.archived&&w.allocated>0)coins+=w.allocated;
    wishes=wishes.filter(x=>x.id!==id);persist();renderW();toast('已删除');
  });
}

// ④ REWARD DETAIL
let wdid=null;
function openWDtl(id){
  const w=wishes.find(x=>x.id===id);if(!w)return;
  wdid=id;
  refreshWDtl();
  document.getElementById('wdtl').classList.add('open');
}
function refreshWDtl(){
  const w=wishes.find(x=>x.id===wdid);if(!w)return;
  const alloc=w.allocated||0;
  const pct=Math.min(100,Math.round(alloc/w.cost*100));
  const remaining=Math.max(0,w.cost-alloc);
  document.getElementById('wdtl-title').textContent=w.name;
  document.getElementById('wdtl-ico').textContent=w.icon;
  document.getElementById('wdtl-name').textContent=w.name;
  document.getElementById('wdtl-cost').textContent=w.cost;
  document.getElementById('wdtl-alloc').textContent=alloc;
  document.getElementById('wdtl-pct').textContent=pct;
  document.getElementById('wdtl-fill').style.width=pct+'%';
  document.getElementById('wdtl-pool').textContent=coins;
  document.getElementById('wdtl-hint').textContent=remaining>0?'还需分配 '+remaining+' ★ 即可兑换':'★ 已达兑换条件，可立即兑换！';
  document.getElementById('alloc-hint-txt').textContent='奖励池余额：'+coins+' ★';
  document.getElementById('alloc-input').value='';
  document.getElementById('alloc-input').max=coins;
  const canRedeem=alloc>=w.cost&&!w.archived;
  const rb=document.getElementById('wdtl-redeem-btn');
  rb.textContent=canRedeem?'🎉 立即兑换':'兑换（待达标）';
  rb.style.color=canRedeem?'var(--green)':'var(--text3)';
  rb.disabled=!canRedeem;
  document.getElementById('alloc-all').disabled=coins<=0;
  document.getElementById('alloc-all').textContent='一键投入全部剩余 ★（'+coins+' ★）';
}
function closeWDtl(){document.getElementById('wdtl').classList.remove('open');wdid=null;renderW();}
function editFromWDtl(){const id=wdid;closeWDtl();openWM(id);}
function redeemFromDtl(){
  const w=wishes.find(x=>x.id===wdid);if(!w)return;
  if((w.allocated||0)<w.cost){toast('星星还不够哦，继续分配吧');return;}
  w.archived=true;
  log.unshift({type:'spend',name:'兑换：'+w.name,icon:w.icon,coins:w.cost,time:new Date().toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})});
  persist();closeWDtl();toast('🎉  「'+w.name+'」已兑换！');
}
function deleteFromWDtl(){
  const w=wishes.find(x=>x.id===wdid);if(!w)return;
  showConfirm('删除奖励','「'+w.name+'」将被永久删除，已分配的星星归还到奖励池。',()=>{
    if(w.allocated>0)coins+=w.allocated;
    wishes=wishes.filter(x=>x.id!==wdid);
    persist();closeWDtl();toast('已删除');
  });
}
function doAlloc(){
  const w=wishes.find(x=>x.id===wdid);if(!w)return;
  const amt=Math.max(0,parseInt(document.getElementById('alloc-input').value)||0);
  if(amt<=0){toast('请输入有效数量');return;}
  if(amt>coins){toast('奖励池余额不足');return;}
  w.allocated=(w.allocated||0)+amt;
  coins-=amt;
  log.unshift({type:'alloc',name:'分配至：'+w.name,icon:w.icon,coins:amt,time:new Date().toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})});
  persist();refreshWDtl();toast('✦  已分配 '+amt+' ★ 到「'+w.name+'」');
}
function doAllocAll(){
  const w=wishes.find(x=>x.id===wdid);if(!w||coins<=0)return;
  const amt=coins;
  w.allocated=(w.allocated||0)+amt;
  coins=0;
  log.unshift({type:'alloc',name:'分配至：'+w.name,icon:w.icon,coins:amt,time:new Date().toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})});
  persist();refreshWDtl();toast('✦  已将全部 '+amt+' ★ 投入「'+w.name+'」');
}

function renderHst(){
  const list=document.getElementById('hstlist');list.innerHTML='';
  if(!log.length){list.innerHTML='<div class="empty">暂无记录</div>';return;}
  log.slice(0,60).forEach(h=>{
    const earn=h.type==='earn';
    const alloc=h.type==='alloc';
    const item=document.createElement('div');item.className='hst-item';
    item.innerHTML=`
      <div class="hst-ico">${h.icon}</div>
      <div class="hst-body"><div class="hst-nm">${h.name}</div><div class="hst-t">${h.time}</div></div>
      <div class="hst-val ${earn?'earn':'spend'}">${earn?'+':alloc?'→':'-'}${h.coins}★</div>`;
    list.appendChild(item);
  });
}

// ── EMOJI UI ──
let hCat=0,wCat=0;
function buildEmojiUI(tabsEl,gridEl,getCat,setCat,getSel,setSel,chkFn){
  tabsEl.innerHTML='';
  ECATS.forEach((cat,i)=>{
    const btn=document.createElement('button');
    btn.className='ecat-tab'+(i===getCat()?' active':'');
    btn.textContent=cat.label;
    btn.onclick=()=>{setCat(i);tabsEl.querySelectorAll('.ecat-tab').forEach((b,j)=>b.classList.toggle('active',j===i));renderEGrid(gridEl,i,getSel,setSel,chkFn);};
    tabsEl.appendChild(btn);
  });
  renderEGrid(gridEl,getCat(),getSel,setSel,chkFn);
}
function renderEGrid(g,ci,getSel,setSel,chkFn){
  g.innerHTML='';
  ECATS[ci].emojis.forEach(e=>{
    const d=document.createElement('div');d.className='eopt'+(getSel()===e?' sel':'');d.textContent=e;d.dataset.e=e;
    d.onclick=()=>{setSel(e);g.querySelectorAll('.eopt').forEach(x=>x.classList.remove('sel'));d.classList.add('sel');chkFn();};
    g.appendChild(d);
  });
}

// ── HABIT MODAL ──
let editHId=null,se='',rv=1;
function openHM(id){
  editHId=id;
  const h=id?habits.find(x=>x.id===id):null;
  document.getElementById('hm-title').textContent=h?'编辑习惯':'新建习惯';
  document.getElementById('hn').value=h?h.name:'';
  rv=h?h.reward:1;document.getElementById('rv').textContent=rv;
  se=h?h.icon:'';
  document.getElementById('hs').disabled=!(h&&h.icon);
  hCat=0;
  buildEmojiUI(document.getElementById('h-cat-tabs'),document.getElementById('heg'),()=>hCat,v=>hCat=v,()=>se,v=>{se=v;},chkH);
  document.getElementById('hm').classList.add('open');
}
function chkH(){document.getElementById('hs').disabled=!(document.getElementById('hn').value.trim()&&se);}
document.getElementById('hn').addEventListener('input',chkH);
function saveH(){
  const nm=document.getElementById('hn').value.trim();if(!nm||!se)return;
  if(editHId){
    const h=habits.find(x=>x.id===editHId);
    if(h){h.name=nm;h.icon=se;h.reward=rv;}
    toast('✦  习惯已更新');
  }else{
    const idx=habits.filter(x=>!x.archived).length;
    habits.push({id:Date.now(),name:nm,icon:se,color:PAL[idx%PAL.length],reward:rv,startDate:TKEY,checks:{},streak:0,totalChecks:0,archived:false});
    toast('✦  新习惯已创建');
  }
  persist();renderH();cm('hm');
}

// ── REWARD MODAL ──
let editWId=null,swe='',wc=20;
function openWM(id){
  editWId=id;
  const w=id?wishes.find(x=>x.id===id):null;
  document.getElementById('wm-title').textContent=w?'编辑奖励':'新建奖励';
  document.getElementById('wn').value=w?w.name:'';
  wc=w?w.cost:20;document.getElementById('wv-input').value=wc;
  swe=w?w.icon:'';
  document.getElementById('ws').disabled=!(w&&w.icon);
  wCat=0;
  buildEmojiUI(document.getElementById('w-cat-tabs'),document.getElementById('weg'),()=>wCat,v=>wCat=v,()=>swe,v=>{swe=v;},chkW);
  document.getElementById('wm').classList.add('open');
}
function chkW(){document.getElementById('ws').disabled=!(document.getElementById('wn').value.trim()&&swe);}
document.getElementById('wn').addEventListener('input',chkW);
function saveW(){
  const nm=document.getElementById('wn').value.trim();if(!nm||!swe)return;
  wc=Math.max(1,parseInt(document.getElementById('wv-input').value)||1);
  if(editWId){
    const w=wishes.find(x=>x.id===editWId);if(w){w.name=nm;w.icon=swe;w.cost=wc;}
    toast('✦  奖励已更新');
  }else{
    wishes.push({id:Date.now(),name:nm,icon:swe,cost:wc,allocated:0,archived:false});
    toast('✦  奖励已添加');
  }
  persist();cm('wm');renderW();
}

function showConfirm(title,msg,onOk){
  document.getElementById('cfm-title').textContent=title;
  document.getElementById('cfm-msg').textContent=msg;
  document.getElementById('cfm-ok').onclick=()=>{cm('cfm');onOk();};
  document.getElementById('cfm').classList.add('open');
}

// ── IO ──
function openIO(){
  const data={habits,wishes,coins,log,ckd,tkey:TKEY};
  document.getElementById('io-export').value=JSON.stringify(data);
  document.getElementById('io-import').value='';
  document.getElementById('io-modal').classList.add('open');
}
function copyExport(){
  const ta=document.getElementById('io-export');ta.select();
  try{document.execCommand('copy');toast('✦  数据已复制');}
  catch(e){navigator.clipboard&&navigator.clipboard.writeText(ta.value).then(()=>toast('✦  数据已复制'));}
}
function doImport(){
  const raw=document.getElementById('io-import').value.trim();
  if(!raw){toast('请先粘贴数据');return;}
  try{
    const d=JSON.parse(raw);
    if(!d.habits||!d.wishes){toast('数据格式不正确');return;}
    habits=d.habits;wishes=d.wishes;coins=d.coins||0;log=d.log||[];
    ckd=(d.ckd&&d.tkey===TKEY)?d.ckd:[];
    persist();cm('io-modal');renderH();
    toast('✦  数据导入成功！');
  }catch(e){toast('解析失败，请检查数据');}
}

function adj(t,d){
  if(t==='r'){rv=Math.max(1,Math.min(20,rv+d));document.getElementById('rv').textContent=rv;}
}
function cm(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.mwrap').forEach(o=>o.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');}));

renderH();
</script>
